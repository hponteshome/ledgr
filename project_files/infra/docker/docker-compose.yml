services:
  postgres:
    image: postgres:16-alpine
    container_name: ledgr-postgres
    environment:
      POSTGRES_USER: ledgr
      POSTGRES_PASSWORD: ledgr123
      POSTGRES_DB: ledgr_app
    ports:
      - "5432:5432"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ledgr-redis
    ports:
      - "6379:6379"
    restart: unless-stopped